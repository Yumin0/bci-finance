<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>財務系統 - 登入頁（深色）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div style="min-height: 100vh; background: rgb(17, 18, 20); font-family: 'Noto Sans TC', Inter, -apple-system, sans-serif; color: rgb(244, 244, 245); padding-top: 64px;">
  <div data-screen-label="登入頁" style="display: flex; justify-content: center; padding: 56px 24px 96px;">
    <div style="width: 100%; max-width: 440px; background: rgb(26, 27, 30); border: 1px solid rgba(149, 153, 164, 0.28); border-radius: 16px; padding: 40px 36px; box-shadow: rgba(0, 0, 0, 0.5) 0px 20px 50px;">
      <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 28px;">
        <img src="assets/logo-mark-white.svg" alt="Biz Civilization icon" style="height: 34px; width: auto;">
        <div style="font-size: 22px; font-weight: 700; letter-spacing: 0.5px;">BCI 財務系統</div>
      </div>

      <div style="display: flex; gap: 32px; justify-content: center; margin-bottom: 12px;">
        <div style="font-size: 15px; font-weight: 700; color: rgb(244, 244, 245); padding-bottom: 12px; border-bottom: 2px solid rgb(244, 244, 245);">登入</div>
        <div style="font-size: 15px; font-weight: 500; color: rgb(149, 153, 164); padding-bottom: 12px;">建立帳號</div>
      </div>
      <div style="height: 1px; background: rgba(149, 153, 164, 0.28); margin-bottom: 24px;"></div>

      <button style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgb(26, 27, 30); border: 1px solid rgba(149, 153, 164, 0.28); border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 600; color: rgb(244, 244, 245); cursor: pointer; font-family: 'Noto Sans TC', Inter, -apple-system, sans-serif;">
        <span style="font-weight: 700; color: #4285F4;">G</span>
        <span>使用 Google 登入</span>
      </button>
      <div style="text-align: center; font-size: 12px; color: rgb(149, 153, 164); margin: 10px 0px 22px;">僅限 @hcatwn.com 帳號使用</div>

      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 22px;">
        <div style="flex: 1 1 0%; height: 1px; background: rgba(149, 153, 164, 0.28);"></div>
        <div style="font-size: 12px; color: rgb(149, 153, 164);">或</div>
        <div style="flex: 1 1 0%; height: 1px; background: rgba(149, 153, 164, 0.28);"></div>
      </div>

      <div style="font-size: 13px; font-weight: 700; margin-bottom: 6px;">Email</div>
      <input placeholder="your@email.com" style="width: 100%; background: rgb(16, 17, 19); border: 1px solid rgba(149, 153, 164, 0.28); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: rgb(244, 244, 245); font-family: 'Noto Sans TC', Inter, -apple-system, sans-serif;">

      <div style="font-size: 13px; font-weight: 700; margin-bottom: 6px; margin-top: 18px;">密碼</div>
      <input type="password" placeholder="請輸入密碼" style="width: 100%; background: rgb(16, 17, 19); border: 1px solid rgba(149, 153, 164, 0.28); border-radius: 10px; padding: 12px 14px; font-size: 14px; color: rgb(244, 244, 245); font-family: 'Noto Sans TC', Inter, -apple-system, sans-serif;">

      <button style="width: 100%; margin-top: 26px; background: rgb(255, 234, 65); color: rgb(17, 18, 20); border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', Inter, -apple-system, sans-serif;">登入</button>
    </div>
  </div>
</div>
</body>
</html>
